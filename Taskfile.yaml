# https://taskfile.dev

version: "3"
silent: true

vars:
  VERSION:
    sh: git describe --tags --always 2>/dev/null || echo dev
  LDFLAGS: -s -w -X github.com/LinPr/s6cmd/version.Version={{.VERSION}} -X github.com/LinPr/s6cmd/version.GitCommit={{.COMMIT}}
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none

tasks:
  default:
    cmds:
      - ./s6cmd -h
    interactive: true
    desc: Run
    deps:
      - build

  build:
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o s6cmd .
    desc: Build binary (version stamped from git)

  release:
    desc: Cross-compile release binaries into dist/
    cmds:
      - mkdir -p dist
      - GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "{{.LDFLAGS}}" -o dist/s6cmd-linux-amd64 .
      - GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "{{.LDFLAGS}}" -o dist/s6cmd-linux-arm64 .
      - GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "{{.LDFLAGS}}" -o dist/s6cmd-darwin-amd64 .
      - GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "{{.LDFLAGS}}" -o dist/s6cmd-darwin-arm64 .
      - GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "{{.LDFLAGS}}" -o dist/s6cmd-windows-amd64.exe
      - GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "{{.LDFLAGS}}" -o dist/s6cmd-windows-arm64.exe
      - cd dist && sha256sum s6cmd-* > checksums.txt

  lint:
    desc: Run base linters
    cmds:
      - golangci-lint run --path-mode=abs --config=".golangci.yml" --timeout=5m
    env:
      GOEXPERIMENT: null

  lint-fix:
    desc: Run base linters and fix issues
    cmds:
      - golangci-lint run --path-mode=abs --config=".golangci.yml" --timeout=5m --fix
    env:
      GOEXPERIMENT: null

  test:
    cmds:
      - go test -v ./...
    desc: Run tests

  fmt:
    desc: Run gofumpt
    cmds:
      - gofumpt -w $(git ls-files '*.go')

  check-nerd-font:
    cmds:
      - nerdfix check $(fd --extension go)
    desc: Find broken nerdfont characters

  fix-nerd-font:
    cmds:
      - nerdfix fix --format=json $(fd --extension go)
    desc: Fix broken nerdfont icons

  docs-prepare:
    cmds:
      - cd docs && pnpm i

  docs-dev:
    cmds:
      - cd docs && pnpm dev
    desc: Start docs server

  docs-build:
    cmds:
      - task: docs-prepare
      - cd docs && pnpm build
    desc: Run docs production build

  docs-preview:
    cmds:
      - task: docs-build
      - cd docs && pnpm preview
    desc: Preview docs production build
