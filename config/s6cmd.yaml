# s6cmd example configuration file
#
# s6cmd resolves settings in this order (highest priority first):
#   1. command-line flag (e.g. --region us-east-1)
#   2. environment variable (e.g. AWS_REGION, S6CMD_USE_PATH_STYLE, ...)
#   3. this config file
#   4. cobra flag default
#
# Pass --config /path/to/s6cmd.yaml or set S6CMD_CONFIG to load a different
# file. With no --config flag, s6cmd looks for $HOME/s6cmd.yaml. The current
# working directory is deliberately not searched.
#
# Every key below mirrors the long flag name; dashes are kept as-is in YAML.

# Override the AWS service endpoint URL. Use this for MinIO, OSS, COS, GCS,
# and other S3-compatible services. Env: AWS_ENDPOINT_URL_S3.
endpoint-url: ""

# AWS region. When empty, the SDK auto-detects via GetBucketRegion and falls
# back to us-east-1. Env: AWS_REGION.
region: ""

# Named profile from the shared credentials file (~/.aws/credentials).
# Env: AWS_PROFILE.
profile: ""

# Disable TLS certificate verification. Handy for self-signed MinIO setups,
# but never use it against a production endpoint. Env: AWS_NO_VERIFY_SSL.
no-verify-ssl: false

# Disable automatic pagination of List* responses. Useful when you want the
# raw single-page behaviour. Env: AWS_NO_PAGINATE.
no-paginate: false

# Output format: one of text, json. Env: AWS_OUTPUT.
output: text

# Log level: one of trace, debug, info, error. Env: S6CMD_LOG.
log: info

# Collect per-operation statistics and print a summary table when the
# command finishes. Env: S6CMD_STAT.
stat: false

# Path-style addressing (https://endpoint/bucket/key rather than the
# virtual-host form https://bucket.endpoint/key). When this key is NOT set
# anywhere (flag/env/config), s6cmd defaults to path-style whenever a custom
# endpoint-url is configured (MinIO, OSS, COS, GCS need it) and to the AWS
# virtual-host default otherwise. Setting the key — true or false — pins the
# style explicitly; e.g. `path-style: false` keeps virtual-host addressing on
# a custom endpoint that supports it. Env: S6CMD_USE_PATH_STYLE.
# path-style: false
